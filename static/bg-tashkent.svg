<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Toshkent elektr tarmog'i — professional fon">
  <!--
    BMI Monitoring — Premium Background
    Toshkent elektr uzatish tarmog'i: gradient + circuit grid + energy flow + glow nodes
    Light/dark mavzular uchun universal (opacity orqali boshqariladi)
  -->

  <defs>
    <!-- Asosiy chuqur gradient (radial mesh) -->
    <radialGradient id="bgRadial" cx="20%" cy="15%" r="90%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="1"/>
      <stop offset="45%" stop-color="#0F172A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>

    <radialGradient id="bgAccent" cx="80%" cy="85%" r="70%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#0891B2" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Energiya oqimi gradientlari -->
    <linearGradient id="energyFlow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="energyFlow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="energyFlow3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#34D399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>

    <!-- Substation node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#06B6D4" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#06B6D4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nodeGlowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="20%" stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Hexagonal circuit pattern -->
    <pattern id="circuitGrid" x="0" y="0" width="80" height="138.56" patternUnits="userSpaceOnUse">
      <path d="M40,0 L80,23.09 L80,69.28 L40,92.38 L0,69.28 L0,23.09 Z"
            fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.18"/>
      <circle cx="40" cy="46.19" r="1.5" fill="#06B6D4" opacity="0.4"/>
    </pattern>

    <!-- Fine dot grid -->
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#60A5FA" opacity="0.25"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Energiya pulsatsiyasi animatsiyasi -->
    <linearGradient id="pulseLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0">
        <animate attributeName="offset" values="-0.3;1.3" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="1">
        <animate attributeName="offset" values="-0.15;1.15" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0">
        <animate attributeName="offset" values="0;1.6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- ========== BAZA QATLAMI ========== -->
  <rect width="1920" height="1080" fill="url(#bgRadial)"/>
  <rect width="1920" height="1080" fill="url(#bgAccent)"/>

  <!-- ========== CIRCUIT NAQSH ========== -->
  <rect width="1920" height="1080" fill="url(#circuitGrid)" opacity="0.6"/>
  <rect width="1920" height="1080" fill="url(#dotGrid)" opacity="0.5"/>

  <!-- ========== ENERGIYA OQIMI CHIZIQLARI (Bezier) ========== -->
  <g opacity="0.55" filter="url(#glowSoft)">
    <!-- Asosiy gorizontal energiya yo'llari -->
    <path d="M0,250 Q480,180 960,300 T1920,260" fill="none" stroke="url(#energyFlow1)" stroke-width="2"/>
    <path d="M0,540 Q480,620 960,500 T1920,580" fill="none" stroke="url(#energyFlow1)" stroke-width="2.5"/>
    <path d="M0,820 Q480,750 960,880 T1920,800" fill="none" stroke="url(#energyFlow2)" stroke-width="2"/>

    <!-- Diagonal energiya tarmoqlari -->
    <path d="M200,0 Q400,400 700,540 T1200,1080" fill="none" stroke="url(#energyFlow3)" stroke-width="1.5"/>
    <path d="M1700,0 Q1500,300 1200,500 T700,1080" fill="none" stroke="url(#energyFlow2)" stroke-width="1.5"/>
    <path d="M0,100 Q600,200 1200,150 T1920,80" fill="none" stroke="url(#energyFlow1)" stroke-width="1"/>
  </g>

  <!-- ========== ELEKTR UZATISH STATSIYALARI (Glow Nodes) ========== -->
  <g>
    <!-- Asosiy stansiyalar (yorqin) -->
    <circle cx="320" cy="280" r="45" fill="url(#nodeGlow)"/>
    <circle cx="320" cy="280" r="4" fill="#FFFFFF" filter="url(#glowSoft)"/>

    <circle cx="960" cy="540" r="60" fill="url(#nodeGlow)"/>
    <circle cx="960" cy="540" r="5" fill="#FFFFFF" filter="url(#glowStrong)"/>

    <circle cx="1600" cy="320" r="40" fill="url(#nodeGlow)"/>
    <circle cx="1600" cy="320" r="3.5" fill="#FFFFFF" filter="url(#glowSoft)"/>

    <circle cx="1450" cy="780" r="50" fill="url(#nodeGlowAmber)"/>
    <circle cx="1450" cy="780" r="4" fill="#FFFFFF" filter="url(#glowSoft)"/>

    <circle cx="480" cy="820" r="42" fill="url(#nodeGlow)"/>
    <circle cx="480" cy="820" r="3.5" fill="#FFFFFF" filter="url(#glowSoft)"/>

    <circle cx="800" cy="160" r="35" fill="url(#nodeGlow)"/>
    <circle cx="800" cy="160" r="3" fill="#FFFFFF" filter="url(#glowSoft)"/>

    <circle cx="1200" cy="900" r="38" fill="url(#nodeGlow)"/>
    <circle cx="1200" cy="900" r="3" fill="#FFFFFF" filter="url(#glowSoft)"/>

    <circle cx="150" cy="600" r="32" fill="url(#nodeGlow)"/>
    <circle cx="150" cy="600" r="2.5" fill="#FFFFFF" filter="url(#glowSoft)"/>

    <circle cx="1820" cy="950" r="36" fill="url(#nodeGlow)"/>
    <circle cx="1820" cy="950" r="3" fill="#FFFFFF" filter="url(#glowSoft)"/>
  </g>

  <!-- ========== STATSIYALARNI BOG'LOVCHI CHIZIQLAR ========== -->
  <g stroke="#06B6D4" stroke-width="0.8" fill="none" opacity="0.35">
    <line x1="320" y1="280" x2="960" y2="540"/>
    <line x1="960" y1="540" x2="1600" y2="320"/>
    <line x1="960" y1="540" x2="1450" y2="780"/>
    <line x1="960" y1="540" x2="480" y2="820"/>
    <line x1="320" y1="280" x2="800" y2="160"/>
    <line x1="800" y1="160" x2="1600" y2="320"/>
    <line x1="1450" y1="780" x2="1820" y2="950"/>
    <line x1="480" y1="820" x2="1200" y2="900"/>
    <line x1="1200" y1="900" x2="1450" y2="780"/>
    <line x1="150" y1="600" x2="480" y2="820"/>
    <line x1="150" y1="600" x2="320" y2="280"/>
  </g>

  <!-- ========== ANIMATSIYALI ENERGIYA PULSI ========== -->
  <g opacity="0.7">
    <line x1="320" y1="280" x2="960" y2="540" stroke="url(#pulseLine)" stroke-width="2.5"/>
    <line x1="960" y1="540" x2="1600" y2="320" stroke="url(#pulseLine)" stroke-width="2.5"/>
    <line x1="960" y1="540" x2="1450" y2="780" stroke="url(#pulseLine)" stroke-width="2.5"/>
  </g>

  <!-- ========== STATSIYALAR ATROFIDA PULSATSIYALANUVCHI HALQALAR ========== -->
  <g fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.6">
    <circle cx="960" cy="540" r="20">
      <animate attributeName="r" values="20;80;20" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="780" r="15" stroke="#F59E0B">
      <animate attributeName="r" values="15;60;15" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="280" r="15">
      <animate attributeName="r" values="15;55;15" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ========== YUQORI VINJETKA (chuqurlik uchun) ========== -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
