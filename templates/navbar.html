<!-- Notification toast container -->
<div id="notification-container" style="position:fixed;top:80px;right:20px;z-index:9999;"></div>

<!-- Dark/Light mode script -->
<script>
function toggleTheme() {
  const body = document.body;
  const isDark = body.classList.toggle('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  const icon = document.getElementById('theme-icon');
  icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}
// Apply saved theme
(function() {
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
    const icon = document.getElementById('theme-icon');
    if (icon) icon.className = 'fas fa-sun';
  }
})();

// Notification system
function showNotification(message, type) {
  const container = document.getElementById('notification-container');
  if (!container) return;
  const toast = document.createElement('div');
  const colors = {danger: '#ef4444', warning: '#f59e0b', success: '#10b981', info: '#3b82f6'};
  const icons = {danger: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', success: 'fa-check-circle', info: 'fa-info-circle'};
  toast.style.cssText = `background:#fff;border-left:4px solid ${colors[type]||'#3b82f6'};border-radius:12px;padding:12px 16px;margin-bottom:8px;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:flex;align-items:center;gap:10px;min-width:300px;animation:slideInRight 0.3s ease;font-size:0.88rem;`;
  toast.innerHTML = `<i class="fas ${icons[type]||'fa-info-circle'}" style="color:${colors[type]||'#3b82f6'};font-size:1.2rem;"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 5000);
}
</script>
<style>
@keyframes slideInRight { from { opacity:0; transform:translateX(50px); } to { opacity:1; transform:translateX(0); } }
</style>
