<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — Monitoring</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(15,32,39,0.7) 0%, rgba(32,58,67,0.7) 40%, rgba(44,83,100,0.7) 100%);
      background-image: url('/static/bg-grid.png');
      background-size: cover;
      background-position: center;
      background-blend-mode: overlay;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.6s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-logo .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #2563EB, #3B82F6);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    .login-logo h2 {
      font-weight: 800;
      color: #1a1a2e;
      font-size: 1.4rem;
    }
    .login-logo p {
      color: #9ca3af;
      font-size: 0.85rem;
    }
    .form-control {
      border-radius: 12px;
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      border: 2px solid #e5e7eb;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    .form-control:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.18);
    }
    .input-group { position: relative; margin-bottom: 1rem; }
    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      z-index: 5;
      font-size: 1rem;
    }
    .btn-login {
      width: 100%;
      padding: 0.75rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      background: linear-gradient(135deg, #2563EB, #3B82F6);
      border: none;
      color: #fff;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59,130,246,0.35);
      background: linear-gradient(135deg, #1D4ED8, #2563EB);
      color: #fff;
    }
    .error-msg {
      background: rgba(239,68,68,0.1);
      color: #dc2626;
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
    }
    .demo-info {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #f1f3f5;
    }
    .demo-info p {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-bottom: 0.25rem;
    }
    .demo-info code {
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.78rem;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">⚡</div>
      <h2>Monitoring Tizimi</h2>
      <p>Toshkent Elektr Uzatish</p>
    </div>

    {% if error %}
    <div class="error-msg">
      <i class="fas fa-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="input-group">
        <i class="fas fa-user input-icon"></i>
        <input type="text" name="username" class="form-control" placeholder="Login" required autofocus>
      </div>
      <div class="input-group">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" name="password" class="form-control" placeholder="Parol" required>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>Kirish
      </button>
    </form>

    <div class="demo-info">
      <p>Demo kirish:</p>
      <p><code>admin</code> / <code>admin123</code></p>
      <p><code>operator</code> / <code>operator123</code></p>
    </div>
  </div>
</body>
    <!-- Theme toggle script -->
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</html>
