<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ta'mirlash buyurtmalari · ElectroGrid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
  <style>
    .ticket-card { background: var(--bg-elevated, #fff); border: 1px solid var(--border-subtle, #e5e7eb); border-radius: 12px; padding: 1rem; margin-bottom: .75rem; transition: all .15s; }
    .ticket-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .ticket-card.in_progress { border-left: 4px solid #f59e0b; }
    .ticket-card.closed { opacity: .55; border-left: 4px solid #22c55e; }
    .ticket-card.open { border-left: 4px solid #ef4444; }
    .badge-status { font-size: .75rem; padding: .35rem .65rem; border-radius: 6px; font-weight: 600; }
  </style>
</head>
<body>
{% include 'navbar.html' %}

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0"><i class="fas fa-tools me-2 text-warning"></i>Ta'mirlash buyurtmalari</h4>
    {% if session.get('role') == 'admin' %}
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newTicketModal">
      <i class="fas fa-plus me-1"></i> Yangi buyurtma
    </button>
    {% endif %}
  </div>

  <div class="row g-2 mb-3">
    <div class="col-md-3">
      <div class="ticket-card text-center"><div class="fs-3 fw-bold text-warning" id="cntActive">0</div><div class="small text-muted">Faol</div></div>
    </div>
    <div class="col-md-3">
      <div class="ticket-card text-center"><div class="fs-3 fw-bold text-danger" id="cntOpen">0</div><div class="small text-muted">Yangi</div></div>
    </div>
    <div class="col-md-3">
      <div class="ticket-card text-center"><div class="fs-3 fw-bold text-success" id="cntClosed">0</div><div class="small text-muted">Yopilgan</div></div>
    </div>
    <div class="col-md-3">
      <div class="ticket-card text-center"><div class="fs-3 fw-bold text-primary" id="cntTotal">0</div><div class="small text-muted">Jami</div></div>
    </div>
  </div>

  <div id="ticketsList"><div class="text-center text-muted py-4">Yuklanmoqda...</div></div>
</div>

<!-- Modal -->
<div class="modal fade" id="newTicketModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Yangi ta'mirlash buyurtmasi</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Sensor ID</label><input type="text" id="t_sensor" class="form-control" placeholder="S001"></div>
        <div class="mb-3"><label class="form-label">Muammo tavsifi</label><textarea id="t_issue" class="form-control" rows="3"></textarea></div>
        <div class="mb-3"><label class="form-label">ETA (taxminiy tugash vaqti)</label><input type="datetime-local" id="t_eta" class="form-control"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Bekor</button>
        <button class="btn btn-primary" onclick="createTicket()">Saqlash</button>
      </div>
    </div>
  </div>
</div>

<script>
const isAdmin = "{{ session.get('role') }}" === "admin";

function loadTickets(){
  fetch('/api/tickets').then(r=>r.json()).then(data=>{
    const list = data.tickets || [];
    const active = list.filter(t=>t.status==='in_progress').length;
    const open = list.filter(t=>t.status==='open').length;
    const closed = list.filter(t=>t.status==='closed').length;
    document.getElementById('cntActive').textContent=active;
    document.getElementById('cntOpen').textContent=open;
    document.getElementById('cntClosed').textContent=closed;
    document.getElementById('cntTotal').textContent=list.length;

    const el = document.getElementById('ticketsList');
    if(!list.length){ el.innerHTML='<div class="text-center text-muted py-5"><i class="fas fa-inbox fa-3x mb-3"></i><div>Hech qanday buyurtma yo\'q</div></div>'; return; }
    el.innerHTML = list.map(t=>{
      const statusBadge = t.status==='closed' ? '<span class="badge-status bg-success bg-opacity-25 text-success">Yopilgan</span>'
        : t.status==='in_progress' ? '<span class="badge-status bg-warning bg-opacity-25 text-warning">Jarayonda</span>'
        : '<span class="badge-status bg-danger bg-opacity-25 text-danger">Yangi</span>';
      const closeBtn = (isAdmin && t.status!=='closed') ? `<button class="btn btn-sm btn-success" onclick="closeT('${t.id}')"><i class="fas fa-check"></i> Yopish</button>` : '';
      return `<div class="ticket-card ${t.status}">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <strong class="me-2"><i class="fas fa-broadcast-tower me-1"></i>${t.sensor_id}</strong>
            ${statusBadge}
            <div class="text-muted small mt-1">${t.id} • ${t.created_by} • ${(t.created_at||'').slice(0,16).replace('T',' ')}</div>
            <div class="mt-2">${t.issue}</div>
            ${t.eta?`<div class="small mt-1"><i class="fas fa-clock me-1"></i>ETA: ${(t.eta||'').replace('T',' ')}</div>`:''}
          </div>
          <div>${closeBtn}</div>
        </div>
      </div>`;
    }).join('');
  });
}

function createTicket(){
  const sensor_id = document.getElementById('t_sensor').value.trim();
  const issue = document.getElementById('t_issue').value.trim();
  const eta = document.getElementById('t_eta').value;
  if(!sensor_id || !issue){ alert('Sensor va muammo kerak'); return; }
  fetch('/api/tickets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sensor_id,issue,eta})})
    .then(r=>r.json()).then(d=>{
      if(d.ok){ bootstrap.Modal.getInstance(document.getElementById('newTicketModal')).hide(); loadTickets(); }
      else alert(d.error||'Xato');
    });
}

function closeT(id){
  if(!confirm('Buyurtmani yopish?')) return;
  fetch('/api/tickets/'+id+'/close',{method:'POST'}).then(r=>r.json()).then(d=>{ if(d.ok) loadTickets(); });
}

loadTickets();
setInterval(loadTickets, 30000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{url_for('static', filename='theme.js')}}"></script>
</body>
</html>
